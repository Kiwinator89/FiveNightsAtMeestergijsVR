<body>

<canvas id="threeCanvas"></canvas>
<button id="enterVRBtn">🥽 SPEEL IN VR</button>
<div id="statusMsg">Five Nights at Meester Gijs — VR Edition</div>

<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ══════════════════════════════════════════════════════
//  SECTION 1 — RENDERER & WEBXR SETUP
// ══════════════════════════════════════════════════════
const canvas3d = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.shadowMap.enabled = false;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setClearColor(0x020202);
renderer.xr.enabled = true;

const btn   = document.getElementById('enterVRBtn');
const msgEl = document.getElementById('statusMsg');

// Check if WebXR is available at all
if (!navigator.xr) {
  btn.textContent = '❌ VR NIET BESCHIKBAAR';
  btn.disabled = true;
  msgEl.textContent = 'Open in Meta Quest browser';
} else {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (!supported) {
      btn.textContent = '❌ VR NIET ONDERSTEUND';
      btn.disabled = true;
      msgEl.textContent = 'VR headset vereist';
    }
  }).catch(() => {});
}

// THE button — one click, enter VR, show night menu
btn.addEventListener('click', () => {
  btn.disabled = true;
  btn.textContent = '⏳ LADEN…';
  msgEl.textContent = 'VR sessie starten…';

  navigator.xr.requestSession('immersive-vr', {
    optionalFeatures: ['local-floor', 'bounded-floor']
  }).then(session => {
    // Three.js r128: setSession may be sync (void) or async (Promise).
    // Handle BOTH cases safely.
    const maybePromise = renderer.xr.setSession(session);
    const afterSet = (maybePromise && typeof maybePromise.then === 'function')
      ? maybePromise
      : Promise.resolve();

    return afterSet.then(() => session);
  }).then(session => {
    btn.style.display = 'none';
    msgEl.style.display = 'none';

    // Show 3D night menu now that VR is running
    showVRMenu();

    session.addEventListener('end', () => {
      btn.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '🥽 SPEEL IN VR';
      msgEl.style.display = 'block';
      if (G && G.running) { killTimers(); stopAll(); if (G) G.running = false; }
    });
  }).catch(err => {
    console.error('VR fout:', err);
    btn.disabled = false;
    btn.textContent = '🥽 SPEEL IN VR';
    msgEl.textContent = 'Fout: ' + (err.message || String(err));
  });
});

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x020202, 0.05);

const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 2.0);
scene.add(camera);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ══════════════════════════════════════════════════════
//  SECTION 2 — CONTROLLER INPUT (VR ONLY)
// ══════════════════════════════════════════════════════
const controllers = [null, null];
let rightTriggerHeld = false;
let leftTriggerHeld  = false;
const prevThumbPress = [false, false];

function makeRayLine() {
  // Ray length 6m — enough to reach all buttons without clipping back wall
  const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-6)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.35 }));
}

for (let i = 0; i < 2; i++) {
  const ctrl = renderer.xr.getController(i);
  ctrl.userData.index = i;
  ctrl.add(makeRayLine());
  // Pointer tip dot at end of ray
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.008, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  dot.position.set(0, 0, -6);
  ctrl.add(dot);
  ctrl.addEventListener('selectstart', () => onTriggerPress(i));
  ctrl.addEventListener('selectend',   () => onTriggerRelease(i));
  ctrl.addEventListener('squeezestart', () => onGripPress(i));
  ctrl.addEventListener('squeezeend',   () => onGripRelease(i));
  scene.add(ctrl);
  scene.add(renderer.xr.getControllerGrip(i));
  controllers[i] = ctrl;
}

function onTriggerPress(idx) {
  if (idx === 1) rightTriggerHeld = true;
  if (idx === 0) leftTriggerHeld  = true;

  // Single raycast — reused for all checks below
  const hit = castFromController(idx);

  // vrMenuAction covers: night buttons, start button, restart button
  // Always checked first regardless of game state
  if (hit && hit.userData.vrMenuAction) {
    handleVRMenuClick(hit.userData.vrMenuAction);
    return;
  }

  // Block all world-action interaction while menu is open
  if (vrMenuState !== 'hidden') return;

  // Block all world-action interaction if game not running / dead / won
  if (!G || !G.running || G.dead || G.won) return;

  // World interactable hit
  if (hit && hit.userData.action) {
    const a = hit.userData.action;
    if (a === 'windUp') { startWindUp(); return; }
    handleVRAction(a);
    return;
  }

  // No interactable hit — fallback door toggles
  if (idx === 0) toggleDoor('left');
  else toggleDoor('right');
}

function onTriggerRelease(idx) {
  if (idx === 1) { rightTriggerHeld = false; stopWindUp(); }
  if (idx === 0) { leftTriggerHeld  = false; }
}

function onGripPress(idx) {
  if (!G || !G.running) return;
  if (idx === 0) toggleCam();
  else toggleVent();
}
function onGripRelease(idx) {}

function pollGamepads() {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    const hi = src.handedness === 'left' ? 0 : 1;
    // Thumbstick press
    const tb = src.gamepad.buttons[3];
    if (tb) {
      if (tb.pressed && !prevThumbPress[hi]) {
        if (hi === 0) toggleCam();
        else toggleVent();
      }
      prevThumbPress[hi] = tb.pressed;
    }
    // Right stick = switch cam
    if (G && G.running && G.camOpen && hi === 1 && src.gamepad.axes.length >= 3) {
      const ax = src.gamepad.axes[2];
      if (Math.abs(ax) > 0.7 && !src._axDeb) {
        src._axDeb = true;
        const nc = G.curCam + (ax > 0 ? 1 : -1);
        if (nc >= 0 && nc < CAMS.length) switchCam(nc);
        setTimeout(() => { src._axDeb = false; }, 350);
      }
    }
  }
  // If right trigger held, maintain windUp only while pointing at windUp button
  if (G && G.running) {
    if (rightTriggerHeld) {
      const hit = castFromController(1);
      if (hit && hit.userData.action === 'windUp') {
        if (!G.isWindingUp) startWindUp();
      } else if (G.isWindingUp) {
        stopWindUp(); // stop if no longer pointing at button
      }
    } else if (G.isWindingUp) {
      stopWindUp(); // stop if trigger released
    }
  }
}

// ══════════════════════════════════════════════════════
//  SECTION 3 — RAYCASTING + POINTER HIGHLIGHT
// ══════════════════════════════════════════════════════
const interactables = [];
const ctrlRay = new THREE.Raycaster();
ctrlRay.far = 6.5; // slightly beyond ray line length

let lastHighlighted = null;

function castFromController(idx) {
  const ctrl = controllers[idx];
  if (!ctrl) return null;
  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(ctrl.quaternion);
  ctrlRay.set(ctrl.position, dir);
  // Intersect all interactables; Three.js will skip non-visible objects internally
  // We filter invisible ourselves to avoid hits on hidden menu buttons
  const hits = ctrlRay.intersectObjects(interactables, false);
  for (const hit of hits) {
    if (hit.object.visible) return hit.object;
  }
  return null;
}

// Per-controller ray tip dots, updated to hit point each frame
const ctrlDots = [null, null];
function initCtrlDots() {
  controllers.forEach((ctrl, i) => {
    if (!ctrl) return;
    // Find the dot child (last added sphere child)
    ctrl.children.forEach(child => {
      if (child instanceof THREE.Mesh && child.geometry instanceof THREE.SphereGeometry) {
        ctrlDots[i] = child;
      }
    });
  });
}

function updatePointerHighlight() {
  // Right controller does primary highlighting, fall back to left
  let hit = castFromController(1);
  if (!hit) hit = castFromController(0);

  // Restore previous highlighted object
  if (lastHighlighted && lastHighlighted !== hit) {
    if (lastHighlighted.userData._origColor !== undefined) {
      lastHighlighted.material.color.setHex(lastHighlighted.userData._origColor);
    }
    lastHighlighted = null;
  }

  // Highlight new target
  if (hit && hit !== lastHighlighted) {
    if (hit.userData._origColor === undefined) {
      hit.userData._origColor = hit.material.color.getHex();
    }
    hit.material.color.setHex(0x44ff88);
    lastHighlighted = hit;
  }

  // Update ray tip dot color: green when hitting something, white otherwise
  [1, 0].forEach(i => {
    const dot = ctrlDots[i];
    if (!dot) return;
    const h = castFromController(i);
    dot.material.color.setHex(h ? 0x44ff88 : 0xffffff);
    // Scale dot up slightly when hitting
    const s = h ? 1.6 : 1.0;
    dot.scale.setScalar(s);
  });
}

function handleVRAction(action) {
  if (!G || !G.running) return;
  switch (action) {
    case 'leftDoor':  toggleDoor('left'); break;
    case 'rightDoor': toggleDoor('right'); break;
    case 'vent':      toggleVent(); break;
    case 'camToggle': toggleCam(); break;
    case 'lure':      useLure(); break;
    case 'alarm':     useCameraAlarm(); break;
    case 'windUp':    startWindUp(); break;
    default:
      if (action.startsWith('cam:')) {
        const id = parseInt(action.split(':')[1]);
        // Opening a camera button always activates the camera view
        G.camOpen = true;
        switchCam(id);
        markHudDirty();
      }
      break;
  }
}

// ══════════════════════════════════════════════════════
//  SECTION 4 — LIGHTS
// ══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x110810, 0.7));
const ceilLight = new THREE.PointLight(0x441100, 0.9, 9);
ceilLight.position.set(0, 2.9, 0);
scene.add(ceilLight);
const redFill = new THREE.PointLight(0x330000, 0.4, 10);
redFill.position.set(-3, 1, -2);
scene.add(redFill);
const lampGlow = new THREE.PointLight(0xffaa44, 0.6, 5);
lampGlow.position.set(0, 2.55, -1);
scene.add(lampGlow);
// Screen glow
const screenGlow = new THREE.PointLight(0x003311, 0.5, 4);
screenGlow.position.set(0, 2.2, -4.5);
scene.add(screenGlow);
// Front-room fill light (behind player area) — gives depth to the back half of office
const frontFill = new THREE.PointLight(0x080410, 0.3, 6);
frontFill.position.set(0, 2.5, 4.5);
scene.add(frontFill);
// Mark vent warning light — pulses red when Mark is present
const markVentLight = new THREE.PointLight(0x440000, 0.0, 3.5);
markVentLight.position.set(0, 2.6, 5.0);
scene.add(markVentLight);
const alarmSphereMat = new THREE.MeshBasicMaterial({ color: 0x440000, transparent: true, opacity: 0, side: THREE.BackSide });
scene.add(new THREE.Mesh(new THREE.SphereGeometry(50, 8, 8), alarmSphereMat));

// ══════════════════════════════════════════════════════
//  SECTION 5 — 3D ROOM CONSTRUCTION
// ══════════════════════════════════════════════════════
const doorMeshes   = { left: null, right: null };
const doorLights   = { left: null, right: null };
const doorAnim     = { left:  { open: 1, target: 1, speed: 3.0 }, right: { open: 1, target: 1, speed: 3.0 } };
const ventAnim     = { open: 1, target: 1, speed: 4.0 };
let ventPanelMesh  = null;
let ventStatusLight = null;

function addMesh(geo, mat, x=0,y=0,z=0,rx=0,ry=0,rz=0) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  scene.add(m); return m;
}

function buildRoom() {
  const wallMat  = new THREE.MeshLambertMaterial({ color: 0x0e0e1a });
  const floorMat = new THREE.MeshLambertMaterial({ color: 0x0c0c10 });
  const ceilMat  = new THREE.MeshLambertMaterial({ color: 0x080808 });

  addMesh(new THREE.PlaneGeometry(12,10), floorMat,  0, 0,  0, -Math.PI/2, 0, 0);
  addMesh(new THREE.PlaneGeometry(12,4),  ceilMat,   0, 3.4, 0,  Math.PI/2, 0, 0);
  addMesh(new THREE.PlaneGeometry(12,4),  wallMat,   0, 1.7,-6);
  addMesh(new THREE.PlaneGeometry(12,4),  wallMat,  -6, 1.7, 0, 0, Math.PI/2, 0);
  addMesh(new THREE.PlaneGeometry(12,4),  wallMat,   6, 1.7, 0, 0,-Math.PI/2, 0);
  addMesh(new THREE.PlaneGeometry(3, 4),  wallMat, -4.5,1.7, 6, 0, Math.PI, 0);
  addMesh(new THREE.PlaneGeometry(3, 4),  wallMat,  4.5,1.7, 6, 0, Math.PI, 0);

  // Desk
  const deskMat = new THREE.MeshLambertMaterial({ color: 0x180e04 });
  addMesh(new THREE.BoxGeometry(2.8,0.08,1.0), deskMat, 0, 0.84, 1.9);
  addMesh(new THREE.BoxGeometry(0.08,0.84,1.0), deskMat, -1.36, 0.42, 1.9);
  addMesh(new THREE.BoxGeometry(0.08,0.84,1.0), deskMat,  1.36, 0.42, 1.9);
  // Chair
  addMesh(new THREE.BoxGeometry(0.55,0.055,0.55), new THREE.MeshLambertMaterial({ color: 0x0d0d0d }), 0, 0.56, 2.5);
  addMesh(new THREE.BoxGeometry(0.55,0.65,0.055), new THREE.MeshLambertMaterial({ color: 0x0d0d0d }), 0, 0.90, 2.75);

  // Blackboard
  buildBlackboard();

  // Ceiling lamp
  addMesh(new THREE.CylinderGeometry(0.012,0.012,0.6,6), new THREE.MeshLambertMaterial({ color: 0x1e1e1e }), 0, 3.1,-1);
  addMesh(new THREE.ConeGeometry(0.28,0.32,8,1,true), new THREE.MeshLambertMaterial({ color: 0x1a1a20, side: THREE.BackSide }), 0, 2.65,-1);

  // Pipes on ceiling
  for (let i = 0; i < 3; i++) {
    const p = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,11,8), new THREE.MeshLambertMaterial({ color: 0x1a1a24 }));
    p.rotation.z = Math.PI/2; p.position.set(0, 3.25, -2+i*1.8); scene.add(p);
  }

  // Bookshelf
  addMesh(new THREE.BoxGeometry(1.1,2.0,0.22), new THREE.MeshLambertMaterial({ color: 0x0d0808 }), 2.8, 1.0,-5.88);
  for (let r = 0; r < 4; r++) for (let b = 0; b < 4; b++) {
    const bk = new THREE.Mesh(new THREE.BoxGeometry(0.19,0.28,0.14), new THREE.MeshLambertMaterial({ color:[0x1a0808,0x081808,0x08081a,0x181808][b%4] }));
    bk.position.set(2.8-0.27+b*0.19, 0.18+r*0.37,-5.79); scene.add(bk);
  }

  // Corridor glimpses
  addMesh(new THREE.BoxGeometry(1.6,2.8,3.5), new THREE.MeshLambertMaterial({ color: 0x040407 }), -5.8,1.4, 0);
  addMesh(new THREE.BoxGeometry(1.6,2.8,3.5), new THREE.MeshLambertMaterial({ color: 0x040407 }),  5.8,1.4, 0);

  // Build doors
  buildDoor3D(-4.5, 'left');
  buildDoor3D( 4.5, 'right');

  // Build vent
  buildVent3D();

  // Small desk monitor (decorative)
  buildDeskMonitor();

  // Big camera screen
  buildBigCameraScreen();
}

function buildBlackboard() {
  addMesh(new THREE.BoxGeometry(2.2,1.3,0.055), new THREE.MeshLambertMaterial({ color: 0x6a3a20 }), -2.5, 2.1,-5.97);
  const bc = document.createElement('canvas'); bc.width=512; bc.height=256;
  const ctx = bc.getContext('2d');
  ctx.fillStyle='#111a0e'; ctx.fillRect(0,0,512,256);
  ctx.fillStyle='#8b0000'; ctx.font='bold 26px monospace'; ctx.textAlign='center';
  ctx.fillText('ENGLISH GRAMMAR',256,55);
  ctx.fillStyle='#444'; ctx.font='18px monospace';
  ctx.fillText('Past Simple · Conditional',256,92); ctx.fillText('Irregular Verbs',256,120);
  ctx.strokeStyle='#cc0000'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(30,148); ctx.lineTo(482,148); ctx.stroke();
  ctx.fillStyle='#cc0000'; ctx.font='bold 34px monospace'; ctx.fillText('★ 1/10 ★',256,205);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(2.1,1.2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(bc), transparent:true }));
  m.position.set(-2.5, 2.1,-5.94); scene.add(m);
}

function buildDeskMonitor() {
  addMesh(new THREE.BoxGeometry(0.6,0.4,0.035), new THREE.MeshLambertMaterial({ color: 0x0c0c14 }), 0.6,1.14,1.65);
  const mc = document.createElement('canvas'); mc.width=256; mc.height=160;
  const ctx = mc.getContext('2d');
  ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,256,160);
  ctx.fillStyle='#00ff66'; ctx.font='bold 14px monospace'; ctx.fillText('SECURITY ONLINE',12,44);
  ctx.fillStyle='rgba(0,255,100,.5)'; ctx.font='12px monospace';
  ctx.fillText('>>> ACTIVE',12,70); ctx.fillText('CAM SYSTEM OK',12,90);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(0.57,0.37), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(mc) }));
  m.position.set(0.6,1.14,1.647); scene.add(m);
}

function buildDoor3D(x, side) {
  const sign = x < 0 ? 1 : -1;
  const frameMat = new THREE.MeshLambertMaterial({ color: 0x181820 });
  // Frame
  addMesh(new THREE.BoxGeometry(1.05,0.12,0.16), frameMat, x, 2.3, 0);
  addMesh(new THREE.BoxGeometry(0.12,2.3,0.16), frameMat, x-0.47, 1.15, 0);
  addMesh(new THREE.BoxGeometry(0.12,2.3,0.16), frameMat, x+0.47, 1.15, 0);

  // Door panel — slides vertically
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.90,2.25,0.08), new THREE.MeshLambertMaterial({ color: 0x080308 }));
  door.position.set(x, -0.5, 0); // starts open (below ground)
  scene.add(door);
  doorMeshes[side] = door;

  // Door status light
  const dl = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8), new THREE.MeshBasicMaterial({ color: 0x111111 }));
  dl.position.set(x + sign*0.40, 2.18, 0.12);
  scene.add(dl);
  doorLights[side] = dl;

  // Interactable button on wall beside frame
  const btn = new THREE.Mesh(
    new THREE.BoxGeometry(0.28, 0.12, 0.06),
    new THREE.MeshLambertMaterial({ color: 0x1a1a44 })
  );
  btn.position.set(x + sign * 0.72, 1.2, 0.24);
  btn.userData.action = side === 'left' ? 'leftDoor' : 'rightDoor';
  btn.userData._origColor = 0x1a1a44;
  scene.add(btn); interactables.push(btn);

  // Button label canvas
  const lc = document.createElement('canvas'); lc.width=128; lc.height=48;
  const lctx = lc.getContext('2d');
  lctx.fillStyle='#1a1a44'; lctx.fillRect(0,0,128,48);
  lctx.fillStyle='#7777ff'; lctx.font='bold 16px monospace'; lctx.textAlign='center';
  lctx.fillText(side==='left'?'L DEUR':'R DEUR', 64, 30);
  const lm = new THREE.Mesh(new THREE.PlaneGeometry(0.26,0.10), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(lc), transparent:true }));
  lm.position.set(x + sign * 0.72, 1.2, 0.27);
  scene.add(lm);
}

function buildVent3D() {
  // This is the DECORATIVE back-wall vent (camera room side) — NOT Mark's vent
  // It is visual-only and has NO interactive button (Mark's vent is on the front wall)
  const ventMat = new THREE.MeshLambertMaterial({ color: 0x3a2a10 });
  addMesh(new THREE.BoxGeometry(0.72,0.58,0.07), ventMat, 0, 2.85,-5.96);
  // Grate bars
  for (let i=-3;i<=3;i++) addMesh(new THREE.BoxGeometry(0.64,0.020,0.020), new THREE.MeshLambertMaterial({ color: 0x2a1a08 }), 0, 2.85+i*0.08,-5.93);
  for (let i=-2;i<=2;i++) addMesh(new THREE.BoxGeometry(0.020,0.52,0.020), new THREE.MeshLambertMaterial({ color: 0x2a1a08 }), i*0.14, 2.85,-5.93);

  // Vent cover panel (shown when closed — animates with ventAnim)
  ventPanelMesh = new THREE.Mesh(new THREE.BoxGeometry(0.70,0.56,0.05), new THREE.MeshLambertMaterial({ color: 0x221808 }));
  ventPanelMesh.position.set(0, 2.85,-5.93);
  ventPanelMesh.visible = false;
  scene.add(ventPanelMesh);

  // Status light (orange when Mark is in vent)
  ventStatusLight = new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6), new THREE.MeshBasicMaterial({ color: 0x111111 }));
  ventStatusLight.position.set(0.30, 3.06,-5.93);
  scene.add(ventStatusLight);
  // NO interactive button here — Mark's vent is controlled from the front-wall button
}

// ══════════════════════════════════════════════════════
//  SECTION 6 — DOOR + VENT ANIMATIONS
// ══════════════════════════════════════════════════════
function updateDoorAnimations(dt) {
  ['left','right'].forEach(side => {
    const anim = doorAnim[side];
    const mesh = doorMeshes[side];
    if (!mesh) return;
    anim.open += (anim.target - anim.open) * Math.min(1, anim.speed * dt);
    // open=1: door at y=-0.5 (below floor, open)
    // open=0: door at y=1.15 (in frame, closed)
    mesh.position.y = -0.5 + (1 - anim.open) * 1.65;
    const dl = doorLights[side];
    if (dl) {
      const closed  = anim.open < 0.1;
      const atDoor  = (side==='left') ? (G&&G.mPos===POS.LD) : (G&&G.mPos===POS.RD);
      // Green = closed+safe, Red = open+monster, Orange = closed+monster, Off = open+safe
      if (closed && atDoor)       dl.material.color.setHex(0xff8800); // orange: closed but threat
      else if (closed)            dl.material.color.setHex(0x00e050); // green: door closed, safe
      else if (atDoor)            dl.material.color.setHex(0xff1100); // red: open, monster here!
      else                        dl.material.color.setHex(0x111111); // off
    }
    // Update door button color to reflect state
    // Find the button for this side in interactables
    for (const obj of interactables) {
      if (obj.userData.action === (side==='left'?'leftDoor':'rightDoor') && obj.userData._origColor !== undefined) {
        const isDoorClosed = anim.open < 0.1;
        const baseColor = isDoorClosed ? 0x1a1a66 : 0x1a1a44;
        // Don't override if currently highlighted by pointer
        if (obj !== lastHighlighted) {
          obj.material.color.setHex(baseColor);
        }
        obj.userData._origColor = baseColor;
        break;
      }
    }
  });
  // Vent
  if (ventPanelMesh) {
    ventAnim.open += (ventAnim.target - ventAnim.open) * Math.min(1, ventAnim.speed * dt);
    const isClosed = ventAnim.open < 0.92;
    ventPanelMesh.visible = isClosed;
    ventPanelMesh.rotation.x = (1 - ventAnim.open) * (Math.PI * 0.45);
    ventPanelMesh.position.y = 2.85 - (1 - ventAnim.open) * 0.22;
  }
  if (ventStatusLight) {
    ventStatusLight.material.color.setHex(G&&G.markInVent&&!G.ventClosed ? 0xff4400 : 0x111111);
  }
}

function makeLabelPlane(text, bgColor, fgColor, x, y, z, w, h) {
  const lc = document.createElement('canvas'); lc.width=128; lc.height=48;

  const bg = '#' + bgColor.toString(16).padStart(6,'0');

  lctx.fillStyle = fgColor; lctx.font='bold 16px monospace'; lctx.textAlign='center';
  lctx.fillText(text, 64, 30);
  const lm = new THREE.Mesh(new THREE.PlaneGeometry(w-0.02,h-0.02), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(lc), transparent:true }));
  lm.position.set(x,y,z); scene.add(lm);
}

function highlightCamBtn(activeId) {
  Object.keys(camBtnMeshes).forEach(id => {
    const m = camBtnMeshes[id];
    if (!m) return;
    const isActive = parseInt(id) === activeId;
    m.material.color.setHex(isActive ? 0x1a5a1a : 0x0a1a0a);
    m.userData._origColor = isActive ? 0x1a5a1a : 0x0a1a0a;
  });
  // Show/hide wind up button
  if (windUpBtnMesh) {
    windUpBtnMesh.visible = (activeId === MUSIC_CAM_ID && G && G.cfg.tomActive);
  }
  // Wind label
  scene.children.forEach(m => {
    if (m.userData._windLabel) m.visible = (activeId === MUSIC_CAM_ID && G && G.cfg.tomActive);
  });
}

// ── Draw the big screen canvas ──────────────────────
function drawBigScreen() {
  const ctx = bigScreenCtx, W = BIG_W, H = BIG_H;
  ctx.clearRect(0,0,W,H);

  // Single timestamp for this frame
  const ts = new Date().toLocaleTimeString('nl-NL');

  // BG
  ctx.fillStyle = '#030808'; ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle = '#081808'; ctx.fillRect(0,0,W,44);
  ctx.fillStyle = '#22aa44'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'left';
  ctx.fillText('SECURITY MONITOR — FNAG SYSTEMS', 12, 28);
  ctx.fillStyle = '#116622'; ctx.textAlign = 'right';
  ctx.fillText(ts, W-12, 28);

  // Camera feed area
  const fx=10, fy=50, fw=600, fh=380;
  ctx.strokeStyle='#1a4a1a'; ctx.lineWidth=2; ctx.strokeRect(fx,fy,fw,fh);

  const camId = (G && G.running) ? G.curCam : 0;
  const bgImg  = camBgImgs[camId];
  if (bgImg && bgImg.naturalWidth > 0) {
    const iR = bgImg.naturalWidth/bgImg.naturalHeight, cR = fw/fh;
    let sw,sh,sx=0,sy=0;
    if(iR>cR){sh=bgImg.naturalHeight;sw=sh*cR;sx=(bgImg.naturalWidth-sw)/2;}
    else{sw=bgImg.naturalWidth;sh=sw/cR;sy=(bgImg.naturalHeight-sh)/2;}
    ctx.drawImage(bgImg, sx,sy,sw,sh, fx,fy,fw,fh);
  } else {
    ctx.fillStyle='#050a05'; ctx.fillRect(fx,fy,fw,fh);
  }

  // Cam tint + scanlines
  ctx.fillStyle='rgba(0,18,4,0.28)'; ctx.fillRect(fx,fy,fw,fh);
  ctx.fillStyle='rgba(0,0,0,0.06)';
  for(let y=fy;y<fy+fh;y+=3) ctx.fillRect(fx,y,fw,1);

  // Cam label
  const cn = CAMS[camId];
  ctx.fillStyle='rgba(0,255,80,0.65)'; ctx.font='bold 14px monospace'; ctx.textAlign='left';
  ctx.fillText(cn ? cn.name+' — '+cn.room : '---', fx+10, fy+20);
  ctx.fillStyle='rgba(0,255,60,0.35)'; ctx.font='11px monospace';
  ctx.fillText(ts, fx+10, fy+fh-8);

  // Vignette on feed
  const vg=ctx.createRadialGradient(fx+fw/2,fy+fh/2,fh*0.18,fx+fw/2,fy+fh/2,fh*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vg; ctx.fillRect(fx,fy,fw,fh);

  // Draw animatronic ON THE FEED (only if in this cam room)
  drawAnimatronicsOnFeed(ctx, camId, fx, fy, fw, fh);

  // ── RIGHT PANEL ──────────────────────────────────
  const rpX=fx+fw+14, rpY=fy, rpW=W-rpX-8;

  // Night label
  ctx.fillStyle='#cc0000'; ctx.font='bold 14px monospace'; ctx.textAlign='left';
  ctx.fillText(G&&G.cfg?G.cfg.label:'FNAG VR', rpX, rpY+16);

  // Clock
  ctx.fillStyle='#0a0a18'; ctx.fillRect(rpX,rpY+22,rpW,62);
  ctx.strokeStyle='#222266'; ctx.lineWidth=1; ctx.strokeRect(rpX,rpY+22,rpW,62);
  ctx.fillStyle='#5555aa'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('TIJD', rpX+rpW/2, rpY+36);
  ctx.fillStyle='#e8920a'; ctx.font='bold 24px monospace';
  ctx.fillText(G&&G.running?gameTimeStr:'12:00 AM', rpX+rpW/2, rpY+76);

  // O2 meter
  const o2Y = rpY+96;
  ctx.fillStyle='#0a0a18'; ctx.fillRect(rpX,o2Y,rpW,78);
  ctx.strokeStyle='#222244'; ctx.lineWidth=1; ctx.strokeRect(rpX,o2Y,rpW,78);
  ctx.fillStyle='#5555aa'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText('O₂ NIVEAU', rpX+rpW/2, o2Y+14);
  const o2pct = G&&G.running ? Math.max(0,G.o2) : 100;
  const bx=rpX+7, by=o2Y+20, bw=rpW-14;
  ctx.fillStyle='#040810'; ctx.fillRect(bx,by,bw,13);
  const fc1=o2pct<=10?'#cc0000':o2pct<=30?'#cc6600':'#0055ee';
  const fc2=o2pct<=10?'#ff3300':o2pct<=30?'#ffaa00':'#55bbff';
  const gr=ctx.createLinearGradient(bx,0,bx+bw,0); gr.addColorStop(0,fc1); gr.addColorStop(1,fc2);
  ctx.fillStyle=gr; ctx.fillRect(bx,by,bw*(o2pct/100),13);
  ctx.fillStyle=o2pct<=10?'#ff4444':o2pct<=30?'#ffaa00':'#88ccff';
  ctx.font='bold 16px monospace'; ctx.textAlign='center';
  ctx.fillText(Math.round(o2pct)+'%', rpX+rpW/2, o2Y+58);

  // Music box meter (if active)
  if (G&&G.cfg&&G.cfg.tomActive) {
    const mbY = o2Y+88;
    ctx.fillStyle='#0a0a14'; ctx.fillRect(rpX,mbY,rpW,70);
    ctx.strokeStyle='#2a2200'; ctx.lineWidth=1; ctx.strokeRect(rpX,mbY,rpW,70);
    ctx.fillStyle='#5a4a00'; ctx.font='10px monospace'; ctx.textAlign='center';
    ctx.fillText('MUZIEKDOOS', rpX+rpW/2, mbY+14);
    const mbpct=G.musicBox||0;
    const mbg=ctx.createLinearGradient(bx,0,bx+bw,0); mbg.addColorStop(0,'#886600'); mbg.addColorStop(1,'#ddcc00');
    ctx.fillStyle='#040810'; ctx.fillRect(bx,mbY+20,bw,13);
    ctx.fillStyle=mbg; ctx.fillRect(bx,mbY+20,bw*(mbpct/100),13);
    ctx.fillStyle='#ddcc00'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
    ctx.fillText(Math.round(mbpct)+'%', rpX+rpW/2, mbY+52);
    // Wind indicator
    if(G.isWindingUp){ ctx.fillStyle='#ffee44'; ctx.font='11px monospace'; ctx.fillText('⚙ OPWINDEN', rpX+rpW/2, mbY+66);}
  }

  // ── MINI CAM THUMBNAILS ──────────────────────────
  const thY=fy+fh+8, thH=H-thY-8;
  ctx.fillStyle='#080810'; ctx.fillRect(8,thY,W-16,thH);
  ctx.strokeStyle='#1a1a2a'; ctx.lineWidth=1; ctx.strokeRect(8,thY,W-16,thH);
  const thW=Math.floor((W-28)/CAMS.length)-4;
  CAMS.forEach((c,i)=>{
    const tx=12+i*(thW+4), ty=thY+4;
    const active=G&&G.curCam===c.id;
    ctx.strokeStyle=active?'#33ff77':'#1a4a1a'; ctx.lineWidth=active?2:1;
    ctx.strokeRect(tx,ty,thW,thH-8);
    ctx.fillStyle=active?'rgba(0,55,18,0.5)':'rgba(0,18,5,0.5)'; ctx.fillRect(tx,ty,thW,thH-8);
    ctx.fillStyle=active?'#33ff77':'#226622'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText(c.name, tx+thW/2, ty+13);
    ctx.fillStyle='#1a4a1a'; ctx.font='9px monospace';
    ctx.fillText(c.room.substring(0,8), tx+thW/2, ty+24);
    // Monster indicator dot
    const hasMon = G&&(
      (G.cfg&&G.cfg.gijsActive&&G.mPos===c.id) ||
      (G.cfg&&G.cfg.hoboActive&&G.hoboPos===c.id) ||
      (G.jeffreyActive&&G.jeffreyPos===c.id) ||
      (G.chapoActive&&c.id===CHAPO_CAM_ID&&!G.chapoAlarm) ||
      (G.diddyActive&&G.diddyPos===c.id)
    );
    if(hasMon){ ctx.fillStyle='#ff2200'; ctx.beginPath(); ctx.arc(tx+thW-6,ty+7,4,0,Math.PI*2); ctx.fill(); }
  });

  bigScreenTex.needsUpdate = true;
}

// Draw animatronic overlays directly onto the camera feed in the big screen
// This replaces the old 2D HTML overlay images
const camAnimOverlays = {};
function loadCamOverlayImg(key, src) {
  if (camAnimOverlays[key]) return;
  const img = new Image(); img.src = src;
  camAnimOverlays[key] = img;
}

function drawAnimatronicsOnFeed(ctx, camId, fx, fy, fw, fh) {
  if (!G || !G.running) return;

  function drawOverlay(img, alignRight, scale) {
    if (!img || !img.complete || img.naturalWidth === 0) return;
    const h = fh * (scale||0.85);
    const w = img.naturalWidth * (h / img.naturalHeight);
    const x = alignRight ? fx+fw-w-fw*0.05 : fx+fw*0.5-w*0.5;
    const y = fy+fh-h;
    ctx.drawImage(img, x, y, w, h);
  }

  // Gijs
  if (G.cfg.gijsActive && G.mPos===camId && camId!==MUSIC_CAM_ID)
    drawOverlay(camAnimOverlays['gijs'], false, 0.88);
  // Hobo
  if (G.cfg.hoboActive && G.hoboPos===camId && camId!==MUSIC_CAM_ID)
    drawOverlay(camAnimOverlays['hobo'], true, 0.80);
  // Jeffrey
  if (G.jeffreyActive && G.jeffreyPos===camId && camId!==MUSIC_CAM_ID)
    drawOverlay(camAnimOverlays['jeffrey'], false, 0.86);
  // Chapo
  if (G.chapoActive && camId===CHAPO_CAM_ID && !G.chapoAlarm)
    drawOverlay(camAnimOverlays['chapo'], false, 0.78);
  // Diddy
  if (G.diddyActive && G.diddyPos===camId && camId!==MUSIC_CAM_ID)
    drawOverlay(camAnimOverlays['diddy'], false, 0.92);
  // Tom (music room)
  if (G.cfg.tomActive && camId===MUSIC_CAM_ID && camAnimOverlays['tom']?.complete) {
    const d = Math.max(0,(100-G.musicBox)/100);
    ctx.globalAlpha = 0.3 + d*0.7;
    drawOverlay(camAnimOverlays['tom'], false, 0.92);
    ctx.globalAlpha = 1.0;
    if (d > 0.3) {
      const dg = ctx.createRadialGradient(fx+fw/2,fy+fh/2,fh*0.2,fx+fw/2,fy+fh/2,fh*0.7);
      dg.addColorStop(0,'rgba(0,0,0,0)'); dg.addColorStop(1,`rgba(180,0,0,${d*0.4})`);
      ctx.fillStyle=dg; ctx.fillRect(fx,fy,fw,fh);
    }
  }
  // Maduro
  if (G.maduroPos===camId && camAnimOverlays['maduro']?.complete) {
    ctx.globalAlpha = 0.7;
    drawOverlay(camAnimOverlays['maduro'], true, 0.65);
    ctx.globalAlpha = 1.0;
  }
  // Mark — shown as a bottom-bar warning text on ALL cameras when in vent (not overlaying image)
  if (G.markInVent && !G.ventClosed) {
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(fx, fy+fh-26, fw, 26);
    ctx.fillStyle='#ff6600'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠ MARK IN VENTILATIE — DRAAI OM & SLUIT VENT', fx+fw/2, fy+fh-8);
  }
  // Maduro camera disabled overlay
  if (G.maduroDisabled && G.maduroDisabled[camId] > 0) {
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(fx,fy,fw,fh);
    ctx.fillStyle='#ff0000'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
    ctx.fillText('CAM OFFLINE', fx+fw/2, fy+fh/2-16);
    ctx.fillStyle='#660000'; ctx.font='14px monospace';
    ctx.fillText('MADURO INTERFERENTIE', fx+fw/2, fy+fh/2+14);
    const sec=Math.ceil(G.maduroDisabled[camId]/1000);
    ctx.fillStyle='#330000'; ctx.font='12px monospace';
    ctx.fillText(`HERVERBINDING IN ${sec}s`, fx+fw/2, fy+fh/2+38);
  }
  // Chapo alarm overlay
  if (G.chapoAlarm) {
    ctx.fillStyle='rgba(180,0,0,0.15)'; ctx.fillRect(fx,fy,fw,fh);
    ctx.strokeStyle='#ff2200'; ctx.lineWidth=4; ctx.strokeRect(fx+2,fy+2,fw-4,fh-4);
  }
}

// ══════════════════════════════════════════════════════
//  SECTION 8 — VR JUMPSCARE (3D plane attached to camera)
// ══════════════════════════════════════════════════════
let jsPlane=null, jsPlaneActive=false, jsPlaneTimer=0;

function initJsPlane() {
  jsPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(3.4, 2.6),
    new THREE.MeshBasicMaterial({ transparent:true, opacity:0, side:THREE.DoubleSide })
  );
  jsPlane.visible = false;
  camera.add(jsPlane);
}
initJsPlane();

function triggerVRJumpscare(imgSrc, onDone) {
  const loader = new THREE.TextureLoader();
  loader.load(imgSrc, tex => {
    jsPlane.material.map = tex;
    jsPlane.material.opacity = 0;
    jsPlane.material.needsUpdate = true;
    jsPlane.position.set(0, 0, -5.0); // start further away
    jsPlane.visible = true;
    jsPlaneActive = true;
    jsPlaneTimer  = 0;
    alarmSphereMat.opacity = 0.5;
    setTimeout(() => { alarmSphereMat.opacity = 0; }, 2000);
    jsPlane.userData.onDone = onDone;
  }, undefined, () => {
    jsPlane.visible = false;
    if (onDone) onDone();
  });
}

function updateJsPlane(dt) {
  if (!jsPlaneActive || !jsPlane) return;
  jsPlaneTimer += dt;

  // Phase 1 (0→0.8s): rush in fast with slight jitter
  // Phase 2 (0.8→2.5s): hold at face, slight sway
  // Phase 3 (2.5→3.5s): fade out
  if (jsPlaneTimer < 0.8) {
    const t = jsPlaneTimer / 0.8;
    // Ease-in cubic: starts fast, slows to -1.2
    const ease = 1 - Math.pow(1-t, 3);
    jsPlane.position.z = -5.0 + ease * 3.8; // -5.0 → -1.2
    jsPlane.material.opacity = Math.min(t * 3.0, 1.0);
    // Random jitter for horror effect
    jsPlane.position.x = (Math.random()-0.5) * 0.06 * t;
    jsPlane.position.y = (Math.random()-0.5) * 0.06 * t;
  } else if (jsPlaneTimer < 2.5) {
    const holdT = (jsPlaneTimer - 0.8) / 1.7;
    jsPlane.position.z = -1.2 + Math.sin(holdT * 12) * 0.025;
    jsPlane.position.x = Math.sin(holdT * 8.3) * 0.018;
    jsPlane.position.y = Math.cos(holdT * 7.1) * 0.012;
    jsPlane.material.opacity = 1.0;
  } else {
    const fadeT = (jsPlaneTimer - 2.5) / 1.0;
    jsPlane.material.opacity = Math.max(0, 1.0 - fadeT);
    jsPlane.position.z = -1.2 - fadeT * 0.5;
  }

  if (jsPlaneTimer >= 3.5) {
    jsPlaneActive = false;
    jsPlane.visible = false;
    jsPlane.material.opacity = 0;
    jsPlane.position.set(0,0,-5.0);
    if (jsPlane.userData.onDone) {
      jsPlane.userData.onDone();
      jsPlane.userData.onDone = null;
    }
  }
}

let lastT=0, flickT=0;
let bigScreenTimer=0;
const BIG_SCREEN_IV = 0.14;
let gameTimeStr = '12:00 AM';

renderer.setAnimationLoop(time => {
  const dt = Math.min((time - lastT) / 1000, 0.1); lastT = time;
  flickT += dt;

  // Lamp flicker
  lampGlow.intensity = 0.6 + Math.sin(flickT*0.7)*0.06 + (Math.random()<0.003 ? Math.random()*0.35-0.17 : 0);

  // Mark vent warning light — pulses red behind player when Mark is in vent
  if (G && G.markInVent && !G.ventClosed) {
    markVentLight.intensity = 0.35 + Math.sin(flickT * 4.5) * 0.25;
  } else {
    markVentLight.intensity = 0;
  }

  // Alarm pulse
  if (G && G.chapoAlarm) alarmSphereMat.opacity = 0.05+Math.sin(time*0.009)*0.05;
  else if (!jsPlaneActive) alarmSphereMat.opacity = 0;

  if (G && G.running) {
    updateDoorAnimations(dt);
    bigScreenTimer += dt;
    if (bigScreenTimer >= BIG_SCREEN_IV) { bigScreenTimer=0; drawBigScreen(); }
  }

  updateJsPlane(dt);
  pollGamepads();
  updatePointerHighlight();

  // Billboard Mark behind player toward camera
  if (markBehindMesh && markBehindMesh.visible) {
    markBehindMesh.lookAt(camera.position.x, markBehindMesh.position.y, camera.position.z);
  }

  // Draw VR HUD when dirty (state changed this tick)
  if (G && G.running && vrHudDirty) drawVRHud();

  renderer.render(scene, camera);
});

function play(k) {
  try {
    const ac = getAudioCtx();
    if (ac && ac.state === 'suspended') ac.resume().catch(()=>{});
    const a = SFX[k];
    if (!a) return;
    a.currentTime = 0;
    a.play().catch(() => {});
  } catch(e) {}
}

function stop(k) {
  try { const a=SFX[k]; if(a){a.pause();a.currentTime=0;} } catch(e){}
}

function stopAll() {
  Object.keys(SFX).forEach(stop);
}

  ctx.fillStyle=fg;   ctx.font='bold 13px monospace'; ctx.textAlign='center';

  ctx.strokeStyle='rgba(60,60,100,0.7)'; ctx.lineWidth=1.5;

  // ── Row 1: Time + Night label ──────────────────────
  const o2pct = Math.max(0, Math.round(G.o2));
  const timeColor = G.hour>=5 ? '#ffee44' : '#e8920a';
  ctx.fillStyle=timeColor; ctx.font='bold 36px monospace'; ctx.textAlign='left';
  ctx.fillText(gameTimeStr, 12, 44);

  ctx.fillStyle='#553333'; ctx.font='bold 16px monospace'; ctx.textAlign='right';
  ctx.fillText(G.cfg.label, W-12, 28);

  // ── Row 2: O2 bar ──────────────────────────────────
  const o2Color = o2pct<=10?'#ff2200':o2pct<=30?'#ff8800':'#2288ff';
  const o2Bg    = o2pct<=10?'rgba(80,0,0,0.6)':o2pct<=30?'rgba(60,30,0,0.6)':'rgba(0,10,30,0.6)';
  ctx.fillStyle=o2Bg; ctx.fillRect(12,52,W-24,22);
  const o2FillW = Math.max(0,(W-24)*(o2pct/100));
  ctx.fillStyle=o2Color; ctx.fillRect(12,52,o2FillW,22);
  ctx.strokeStyle='rgba(80,80,120,0.5)'; ctx.lineWidth=1; ctx.strokeRect(12,52,W-24,22);
  ctx.fillStyle='#ffffff'; ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText(`O₂  ${o2pct}%`, 18, 67);

function drawVRHud() {
  if (!vrHudCtx || !G || !G.running) return;
  if (!vrHudDirty) return;
  vrHudDirty = false;

  const ctx=vrHudCtx, W=VR_HUD_W, H=VR_HUD_H;
  ctx.clearRect(0,0,W,H);

  // ── Row 4: Music box (if active) ──────────────────
  if (G.cfg.tomActive) {
    const mbpct = Math.max(0, Math.round(G.musicBox));
    const mbColor = mbpct<=20?'#ff2200':mbpct<=50?'#ffaa00':'#ddcc00';
    ctx.fillStyle='rgba(10,10,4,0.7)'; ctx.fillRect(12,128,W-24,22);
    const mbW = Math.max(0,(W-24)*(mbpct/100));
    ctx.fillStyle=mbColor; ctx.fillRect(12,128,mbW,22);
    ctx.strokeStyle='rgba(80,70,0,0.5)'; ctx.lineWidth=1; ctx.strokeRect(12,128,W-24,22);
    ctx.fillStyle='#ffffff'; ctx.font='bold 13px monospace'; ctx.textAlign='left';
    ctx.fillText(`🎵 MUZIEKDOOS  ${mbpct}%${G.isWindingUp?' ⚙':''}`, 18, 143);
  }

  // ── Row 5: Mark warning overlay ───────────────────
  if (G.markInVent && !G.ventClosed) {
    ctx.fillStyle='rgba(255,60,0,0.15)';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=3; ctx.strokeRect(1,1,W-2,H-2);
    ctx.fillStyle='#ff4400'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠ MARK ACHTER JE — SLUIT VENT!', W/2, H-12);
  }

  // ── Current cam label (bottom right) ──────────────
  if (G.camOpen) {
    const cn = CAMS[G.curCam];
    ctx.fillStyle='rgba(0,80,30,0.8)'; ctx.font='bold 13px monospace'; ctx.textAlign='right';
    ctx.fillText(`📷 ${cn?cn.name+' '+cn.room:''}`, W-12, H-12);
  }

  vrHudTex.needsUpdate = true;
}

function showVRDeathScreen(msg) {

  ctx.fillStyle='rgba(2,0,0,0.95)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#880000'; ctx.font='bold 64px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, 90);
  ctx.fillStyle='#4a3030'; ctx.font='22px monospace';
  // Strip HTML tags
  const clean = msg.replace(/<[^>]+>/g,' ');
  const words=clean.split(' '); let line='', y=160, lh=34;
  words.forEach(w=>{
    const t=line+w+' ';
    if(ctx.measureText(t).width>650&&line){ctx.fillText(line.trim(),W/2,y);y+=lh;line=w+' ';}else line=t;
  });
  if(line) ctx.fillText(line.trim(),W/2,y);
  ctx.fillStyle='#2a6a2a'; ctx.font='20px monospace';
  ctx.fillText('Kijk naar de RESTART knop om opnieuw te spelen', W/2, H-60);

}

function toggleCam(){

function switchCam(id){

function toggleDoor(side){
  if(!G||G.dead||G.won)return;
  if(side==='left'){
    G.lfClosed=!G.lfClosed;
    doorAnim.left.target=G.lfClosed?0:1;
    if(G.lfClosed) play('doorClose');

    else if(!G.lfClosed&&G.cfg.gijsActive&&G.mPos===POS.LD) armDoorTimer();
  } else {
    G.rtClosed=!G.rtClosed;
    doorAnim.right.target=G.rtClosed?0:1;

    if(G.rtClosed&&G.mPos===POS.RD&&G.mDoorTimer){clearTimeout(G.mDoorTimer);G.mDoorTimer=null;}

  }

}
window.toggleDoor=toggleDoor;

function toggleVent(){
  if(!G||G.dead||G.won)return;
  G.ventClosed=!G.ventClosed;
  ventAnim.target=G.ventClosed?0:1;
  if(G.ventClosed) play('doorClose');
  // Update all vent buttons' base color to reflect state
  for(const obj of interactables){
    if(obj.userData.action==='vent' && obj !== lastHighlighted){
      obj.material.color.setHex(G.ventClosed ? 0x225500 : 0x442200);

    }
  }

  else if(!G.ventClosed&&G.markInVent){if(G.markKillTimer)clearTimeout(G.markKillTimer);G.markKillTimer=setTimeout(()=>{if(!G.dead&&!G.won&&G.markInVent&&!G.ventClosed)triggerMarkJS();},1000);}
  markHudDirty();
}
window.toggleVent=toggleVent;

function inLureRange(){
  if(!G)return false;
  const adj={0:[1],1:[0,2],2:[1,3,4],3:[2,5],4:[2,6],5:[3],6:[4]};
  const cur = G.curCam;
  // Gijs: on current cam or adjacent, not music room
  const gR = G.cfg.gijsActive && cur!==MUSIC_CAM_ID &&
             (G.mPos===cur || (adj[G.mPos]||[]).includes(cur));
  // Hobo: exactly on current cam, not music room
  const hR = G.cfg.hoboActive && cur!==MUSIC_CAM_ID && G.hoboPos===cur;
  // Diddy: exactly on current cam, not music room
  const dR = G.diddyActive && cur!==MUSIC_CAM_ID && G.diddyPos===cur;
  return gR||hR||dR;
}

function useLure(){
  if(!G||!G.lureReady||!inLureRange()||G.dead||G.won)return;
  if(G.cfg.hoboActive&&G.hoboPos===G.curCam&&G.curCam!==MUSIC_CAM_ID){triggerHoboJS();return;}
  play('lure');
  if(G.diddyActive&&G.diddyPos===G.curCam&&G.curCam!==MUSIC_CAM_ID){if(G.diddyMoveTimer)clearTimeout(G.diddyMoveTimer);G.diddyPos=Math.max(0,G.diddyPos-1);G.diddyPath=null;scheduleDiddyMove();}
  const pb={5:3,6:4,4:2,3:2,2:1,1:0,0:0}; const np=pb[G.mPos];
  if(np!==undefined){G.mPos=np;if(G.mDoorTimer){clearTimeout(G.mDoorTimer);G.mDoorTimer=null;}if(G.mRetreatTimer){clearTimeout(G.mRetreatTimer);G.mRetreatTimer=null;}}
  G.lureReady=false; G.lureCD=LURE_CD_S; clearInterval(G.lureCDTimer);
  G.lureCDTimer=setInterval(()=>{G.lureCD--;if(G.lureCD<=0){G.lureReady=true;G.lureCD=0;clearInterval(G.lureCDTimer);}markHudDirty();},1000);
  markHudDirty();
}
window.useLure=useLure;

function useCameraAlarm(){
  if(!G||!G.alarmReady||G.dead||G.won)return;
  play('cameraAlarm');
  if(G.chapoActive&&(G.curCam===CHAPO_CAM_ID||G.chapoAlarm)) resetChapo();
  if(G.diddyActive&&G.diddyPos===G.curCam&&G.curCam!==MUSIC_CAM_ID) resetDiddy();

  markHudDirty();
}
window.useCameraAlarm=useCameraAlarm;

function startWindUp(){
  if(!G||G.dead||G.won)return;
  // In VR the 3D screen is always visible — no need to require G.camOpen
  // But we do need to be on Music Room cam conceptually for the AI tick to register winding
  if(G.curCam !== MUSIC_CAM_ID){

  G.isWindingUp=true;

}

}

// ══════════════════════════════════════════════════════
//  SECTION 17 — AI: GIJS
// ══════════════════════════════════════════════════════
function scheduleGijsMove(){
  if(G.mMoveTimer)clearTimeout(G.mMoveTimer);
  if(G.dead||G.won||!G.cfg.gijsActive)return;
  const base=G.cfg.moveIval[Math.min(G.hour,5)];
  if(!isFinite(base))return;
  G.mMoveTimer=setTimeout(()=>{advanceGijs();scheduleGijsMove();},Math.max(500,base+Math.random()*4000-1500));
}
function advanceGijs(){
  if(G.dead||G.won||!G.cfg.gijsActive)return;
  if(G.mPos===POS.LD||G.mPos===POS.RD)return;
  if(Math.random()<0.2)play('laugh');
  let np=G.mPos;
  if(G.mPos===POS.C0)np=POS.C1;
  else if(G.mPos===POS.C1)np=POS.C2;
  else if(G.mPos===POS.C2){if(!G.mPath)G.mPath=Math.random()<.5?'left':'right';np=G.mPath==='left'?POS.C3:POS.C4;G.mPath=null;}
  else if(G.mPos===POS.C3)np=POS.LD;
  else if(G.mPos===POS.C4)np=POS.RD;
  G.mPos=np;
  if(np===POS.LD||np===POS.RD)gijsAtDoor(np);
}
function gijsAtDoor(pos){
  const closed=pos===POS.LD?G.lfClosed:G.rtClosed;
  if(!closed)armDoorTimer();
  if(G.mRetreatTimer)clearTimeout(G.mRetreatTimer);
  G.mRetreatTimer=setTimeout(retreatGijs,DOOR_RETREAT_MIN+Math.random()*(DOOR_RETREAT_MAX-DOOR_RETREAT_MIN));
}
function retreatGijs(){
  if(G.dead||G.won)return;
  if(G.mPos!==POS.LD&&G.mPos!==POS.RD)return;
  if(G.mDoorTimer){clearTimeout(G.mDoorTimer);G.mDoorTimer=null;}
  G.mPos=[POS.C0,POS.C1,POS.C2][Math.floor(Math.random()*3)];
  play('footsteps');
}
function armDoorTimer(){
  if(G.mDoorTimer)clearTimeout(G.mDoorTimer);
  if(G.dead||G.won||!G.cfg.gijsActive)return;
  G.mDoorTimer=setTimeout(()=>{
    if(G.dead||G.won)return;
    if(G.mPos===POS.LD&&!G.lfClosed)triggerGijsJS();
    if(G.mPos===POS.RD&&!G.rtClosed)triggerGijsJS();
  },GRACE_MS);
}

// ══════════════════════════════════════════════════════
//  SECTION 18 — AI: HOBO
// ══════════════════════════════════════════════════════
function scheduleHoboMove(){
  if(G.hoboMoveTimer)clearTimeout(G.hoboMoveTimer);
  if(G.dead||G.won||!G.cfg.hoboActive)return;
  const delay=G.cfg.hoboMinMs+Math.random()*(G.cfg.hoboMaxMs-G.cfg.hoboMinMs);
  if(!isFinite(delay))return;
  G.hoboMoveTimer=setTimeout(()=>{moveHobo();scheduleHoboMove();},delay);
}
function moveHobo(){
  if(G.dead||G.won||!G.cfg.hoboActive)return;
  const cams=[0,1,2,3,4]; let np,att=0;
  do{np=cams[Math.floor(Math.random()*cams.length)];att++;}while(np===G.hoboPos&&att<20);
  G.hoboPos=np;
}

function scheduleDiddyMove(){

  const base=DIDDY_MOVE_BASE[Math.min(G.hour,5)];if(!isFinite(base))return;

function advanceDiddy(){

  if(G.diddyPos===POS.LD||G.diddyPos===POS.RD){triggerDiddyJS();return;}
  let np=G.diddyPos;
  if(G.diddyPos===POS.C0)np=POS.C1;

  else if(G.diddyPos===POS.C3)np=POS.LD;
  else if(G.diddyPos===POS.C4)np=POS.RD;
  G.diddyPos=np;
  if(np===POS.LD||np===POS.RD){if(G.diddyMoveTimer)clearTimeout(G.diddyMoveTimer);G.diddyMoveTimer=setTimeout(()=>{if(!G.dead&&!G.won)triggerDiddyJS();},2500);}

//  SECTION 22 — AI: MADURO
// ══════════════════════════════════════════════════════
function scheduleMaduro(){
  if(G.maduroTimer)clearInterval(G.maduroTimer);
  G.maduroTimer=setInterval(()=>{
    if(G.dead||G.won||G.maduroPos>=0)return;
    if(Math.random()<G.cfg.maduroChance){
      const av=MADURO_CAMS.filter(id=>!(G.maduroDisabled&&G.maduroDisabled[id]>0));
      if(av.length)maduroSpawn(av[Math.floor(Math.random()*av.length)]);
    }
  },MADURO_APPEAR_IV);
}
function maduroSpawn(id){G.maduroPos=id;G.maduroWatchMs=0;}
function maduroDespawn(){if(G.maduroPos<0)return;G.maduroPos=-1;G.maduroWatchMs=0;}
function tickMaduro(){
  if(G.dead||G.won)return;
  if(!G.maduroDisabled)G.maduroDisabled={};
  Object.keys(G.maduroDisabled).forEach(cId=>{
    if(G.maduroDisabled[cId]>0) G.maduroDisabled[cId]-=TICK_MS;
    if(G.maduroDisabled[cId]<0) G.maduroDisabled[cId]=0;
  });
  if(G.maduroPos>=0&&G.camOpen&&G.curCam===G.maduroPos&&!(G.maduroDisabled[G.curCam]>0)){
    G.maduroWatchMs+=TICK_MS;
    if(G.maduroWatchMs>=MADURO_WATCH_LIM) triggerMaduroDisable(G.maduroPos);
  } else if(G.maduroPos>=0) G.maduroWatchMs=0;
}
function triggerMaduroDisable(camId){
  play('shock');G.maduroPos=-1;G.maduroWatchMs=0;
  if(!G.maduroDisabled)G.maduroDisabled={};
  G.maduroDisabled[camId]=MADURO_DISABLE_MS;
  // Auto switch away
  setTimeout(()=>{
    if(!G.dead&&!G.won&&G.camOpen&&G.curCam===camId){
      const other=CAMS.find(c=>c.id!==camId&&!(G.maduroDisabled&&G.maduroDisabled[c.id]>0));
      if(other)switchCam(other.id);
    }
  },2200);
}

// ── MARK'S BEHIND-PLAYER SPAWN POSITION ──────────────
// The player sits at z≈2.0, facing -Z (toward the camera wall).
// "Behind" the player = positive Z (the front wall with the door gap).
// Mark crawls out of a vent behind the player's head — very scary in VR.
const MARK_SPAWN_POS = new THREE.Vector3(0, 2.4, 5.2);  // behind player, near ceiling front wall

// 3D vent hole on the front wall (behind player) — where Mark emerges
function buildMarkVentOpening() {
  const ventMat = new THREE.MeshLambertMaterial({ color: 0x1a1008 });
  // Vent frame on front wall (z=6, facing INTO the room)
  addMesh(new THREE.BoxGeometry(0.65,0.52,0.06), ventMat, 0, 2.65, 5.96);
  // Grate bars
  for(let i=-2;i<=2;i++){
    addMesh(new THREE.BoxGeometry(0.58,0.016,0.016), new THREE.MeshLambertMaterial({color:0x221208}), 0, 2.65+i*0.07, 5.93);
    addMesh(new THREE.BoxGeometry(0.016,0.48,0.016), new THREE.MeshLambertMaterial({color:0x221208}), i*0.12, 2.65, 5.93);
  }
  // Red warning light above vent
  const markWarnLight = new THREE.Mesh(new THREE.SphereGeometry(0.035,6,6), new THREE.MeshBasicMaterial({ color:0x111111 }));
  markWarnLight.position.set(0.28, 2.88, 5.93);
  scene.add(markWarnLight);
  scene.userData.markWarnLight = markWarnLight;

  // ── VENT CONTROL BUTTON — left side of office, near player ──
  // Player turns around and sees Mark + this button on the left wall
  const markVentBtnMesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.16, 0.28),  // mounted on left wall, sticks out into room
    new THREE.MeshLambertMaterial({ color: 0x442200 })
  );
  markVentBtnMesh.position.set(-5.94, 1.35, 3.5); // on left wall, player height
  markVentBtnMesh.userData.action = 'vent';
  markVentBtnMesh.userData._origColor = 0x442200;
  scene.add(markVentBtnMesh); interactables.push(markVentBtnMesh);

  // Label canvas — on the face of the button (facing +X into room)
  const mvlc = document.createElement('canvas'); mvlc.width=128; mvlc.height=64;
  const mvlctx = mvlc.getContext('2d');
  mvlctx.fillStyle='#2a1400'; mvlctx.fillRect(0,0,128,64);
  mvlctx.strokeStyle='#884400'; mvlctx.lineWidth=2; mvlctx.strokeRect(2,2,124,60);
  mvlctx.fillStyle='#ffaa44'; mvlctx.font='bold 16px monospace'; mvlctx.textAlign='center';
  mvlctx.fillText('VENT', 64, 24);
  mvlctx.fillStyle='#cc6600'; mvlctx.font='13px monospace';
  mvlctx.fillText('SLUITEN', 64, 44);
  const mvlm = new THREE.Mesh(
    new THREE.PlaneGeometry(0.26, 0.14),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(mvlc), transparent:true })
  );
  // Position slightly off wall face, rotated to face +X (into room)
  mvlm.position.set(-5.90, 1.35, 3.5);
  mvlm.rotation.y = Math.PI / 2; // face into room (+X direction)
  scene.add(mvlm);
}

// Mark sprite (billboarded plane, shown behind player when markInVent)
let markBehindMesh = null;
function buildMarkBehindSprite() {
  const tex = new THREE.TextureLoader().load(FILES.markVent, t=>{ t.needsUpdate=true; });
  markBehindMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.55, 0.72),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, alphaTest:0.06, side:THREE.DoubleSide })
  );
  markBehindMesh.position.copy(MARK_SPAWN_POS);
  markBehindMesh.visible = false;
  scene.add(markBehindMesh);
}
// ══════════════════════════════════════════════════════
//  SECTION 23 — AI: MARK (SPAWNS BEHIND PLAYER)
// ══════════════════════════════════════════════════════
function scheduleMarkCheck(){
  if(G.markCheckIval)clearInterval(G.markCheckIval);
  if(!G.cfg.markRutteActive)return;
  G.markCheckIval=setInterval(()=>{ if(G.dead||G.won||G.markInVent)return; if(Math.random()<0.10)markAppear(); },10000);
}
function markAppear(){
  if(G.dead||G.won||G.markInVent)return;
  G.markInVent=true; play('vent');
  if(Math.random()<0.2) setTimeout(()=>play('markAudio'),400);
  // Show Mark's sprite BEHIND the player at the front-wall vent
  if(markBehindMesh){
    markBehindMesh.position.copy(MARK_SPAWN_POS);
    // Face toward player (negative Z)
    markBehindMesh.lookAt(camera.position.x, MARK_SPAWN_POS.y, camera.position.z);
    markBehindMesh.visible=true;
  }
  const wl=scene.userData.markWarnLight;
  if(wl) wl.material.color.setHex(0xff3300);
  markHudDirty();
  if(G.ventClosed){ markLeaveAfter(1000+Math.random()*2000); return; }
  if(G.markKillTimer)clearTimeout(G.markKillTimer);
  G.markKillTimer=setTimeout(()=>{ if(!G.dead&&!G.won&&G.markInVent&&!G.ventClosed)triggerMarkJS(); },8000);
}
function markLeave(){
  if(!G.markInVent)return;
  G.markInVent=false;
  if(G.markKillTimer){clearTimeout(G.markKillTimer);G.markKillTimer=null;}
  if(G.markLeaveTimer){clearTimeout(G.markLeaveTimer);G.markLeaveTimer=null;}
  stop('vent');
  if(markBehindMesh) markBehindMesh.visible=false;
  const wl=scene.userData.markWarnLight;
  if(wl) wl.material.color.setHex(0x111111);
  markHudDirty();
}
function markLeaveAfter(ms){
  if(G.markLeaveTimer)clearTimeout(G.markLeaveTimer);
  G.markLeaveTimer=setTimeout(markLeave,ms);
}

// ══════════════════════════════════════════════════════
//  SECTION 24 — MUSIC BOX (TOM)
// ══════════════════════════════════════════════════════
function tickMusicBox(){
  if(!G.cfg.tomActive||G.dead||G.won)return;
  if(G.isWindingUp&&G.camOpen&&G.curCam===MUSIC_CAM_ID) G.musicBox=Math.min(100,G.musicBox+MB_WIND_RATE);
  else{const drain=MB_DRAIN_BASE+MB_DRAIN_SCALE*Math.min(G.hour,5);G.musicBox=Math.max(0,G.musicBox-drain);if(G.musicBox<=0)triggerTomJS();}
  if(SFX.muziek)SFX.muziek.playbackRate=G.musicBox>50?1:G.musicBox>25?0.82:G.musicBox>10?0.62:0.4;
}

// ══════════════════════════════════════════════════════
//  SECTION 25 — JUMPSCARE & DEATH
// ══════════════════════════════════════════════════════
function doJumpscare(imgSrc, cause){
  if(!G||G.dead)return;
  G.dead=true; killTimers(); stopAll(); play('jumpscare');
  triggerVRJumpscare(imgSrc, () => showVRDeathScreen(cause));
  if(vrHudMesh) vrHudMesh.visible=false;
  if(vrRestartBtn && !vrRestartBtn.visible){
    vrRestartBtn.visible=true;
    if(vrRestartBtn.userData._label) vrRestartBtn.userData._label.visible=true;
    // Only add to interactables if not already there
    if(!interactables.includes(vrRestartBtn)) interactables.push(vrRestartBtn);
  }
}

function triggerGijsJS()   {doJumpscare(FILES.gijsJS,     'Meester Gijs heeft je gevonden. "That\'s a 1 out of 10."');}
function triggerPatrickJS(){doJumpscare(FILES.patrickJS,  'De zuurstof raakte op. "You should have studied harder."');}
function triggerHoboJS()   {doJumpscare(FILES.hoboGijsJS, 'Je lokte het verkeerde monster.');}
function triggerTomJS()    {stopWindUp();doJumpscare(FILES.tomJS,'De muziek stopte.');}
function triggerJeffreyJS(){doJumpscare(FILES.jeffreyJS,  'Jeffrey heeft je gevonden.');}
function triggerMarkJS()   {if(!G||G.dead)return;markLeave();doJumpscare(FILES.markJS,'Mark kwam uit de ventilatie.');}
function triggerChapoJS()  {if(!G||G.dead)return;stop('alarm');doJumpscare(FILES.chapoJS,'Chapo heeft aangevallen.');}
function triggerDiddyJS()  {if(!G||G.dead)return;doJumpscare(FILES.diddyJS,'Diddy heeft je gevonden.');}

function triggerWin(){
  if(!G||G.won||G.dead)return;
  G.won=true; killTimers(); stopAll(); play('win');
  // Show win panel
  const ctx=vrDeathCtx, W=768, H=512;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,10,2,0.95)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#22dd55'; ctx.font='bold 72px monospace'; ctx.textAlign='center';
  ctx.fillText('6:00 AM', W/2, 100);
  ctx.fillStyle='#226633'; ctx.font='24px monospace';
  ctx.fillText('OVERLEEFD', W/2, 150);
  ctx.fillStyle='#3a6a3a'; ctx.font='18px monospace';
  ctx.fillText('"Most students don\'t make it past 3 AM."', W/2, 220);
  ctx.fillStyle='#226622'; ctx.font='18px monospace';
  ctx.fillText('Kijk naar de OPNIEUW knop', W/2, H-60);
  vrDeathTex.needsUpdate=true;
  vrDeathMesh.visible=true;
  if(vrHudMesh) vrHudMesh.visible=false;
  if(vrRestartBtn && !vrRestartBtn.visible){
    vrRestartBtn.visible=true;
    if(vrRestartBtn.userData._label) vrRestartBtn.userData._label.visible=true;
    if(!interactables.includes(vrRestartBtn)) interactables.push(vrRestartBtn);
  }
}

// ══════════════════════════════════════════════════════
//  SECTION 26 — GAME TICK & TIME
// ══════════════════════════════════════════════════════
function gameTick(){
  if(!G||G.dead||G.won)return;
  let drain=O2_DRAIN_BASE;
  if(G.lfClosed)drain+=O2_DOOR_TICK;
  if(G.rtClosed)drain+=O2_DOOR_TICK;
  if(G.camOpen) drain+=O2_CAM_TICK;
  if(G.ventClosed)drain+=O2_VENT_TICK;
  G.o2=Math.max(0,G.o2-drain);
  if(G.o2<=0&&!G.o2Dead)oxygenDepleted();
  tickMusicBox(); tickJeffrey(); tickChapo(); tickMaduro();
  markHudDirty(); // flag HUD for redraw next frame
}

function oxygenDepleted(){
  G.o2Dead=true; stop('ambience'); play('oxygenOut');
  setTimeout(triggerPatrickJS,8000);
}

function tickTime(){
  if(!G||G.dead||G.won)return;
  const prog=Math.min(1,(Date.now()-G.nightStart)/NIGHT_MS);
  if(prog>=1){triggerWin();return;}
  const mins=prog*360;
  G.hour=Math.floor(mins/60);
  const h=G.hour===0?12:G.hour;
  const m=String(Math.floor(mins%60)).padStart(2,'0');
  gameTimeStr=`${h}:${m} AM`;
  if(G.hour>=5&&!G.fiveAMDone){G.fiveAMDone=true;stop('ambience');play('fiveAM');}
}

function killTimers(){
  if(!G)return;
  [G.tickTimer,G.timeTimer,G.mMoveTimer,G.mDoorTimer,G.mRetreatTimer,G.lureCDTimer,
   G.hoboMoveTimer,G.chapoKillTimer,G.markCheckIval,G.markKillTimer,G.markLeaveTimer,
   G.maduroTimer,G.diddyMoveTimer,G.alarmCDTimer
  ].forEach(t=>{ if(t){try{clearInterval(t);clearTimeout(t);}catch(e){}} });
}

// ══════════════════════════════════════════════════════
//  SECTION 27 — START / RESTART
// ══════════════════════════════════════════════════════
function startGame(){
  if(!selectedNight)return;
  hideVRMenu();
  if(vrDeathMesh)vrDeathMesh.visible=false;
  if(vrRestartBtn){
    vrRestartBtn.visible=false;
    const idx=interactables.indexOf(vrRestartBtn);
    if(idx>-1)interactables.splice(idx,1);
    if(vrRestartBtn.userData._label)vrRestartBtn.userData._label.visible=false;
  }

  G = mkState(); G.nightStart=Date.now(); G.running=true;
  G.camOpen = true; // In VR big screen is always visible; start with cameras active
  gameTimeStr='12:00 AM';
  bigScreenTimer = 0; // prevent immediate burst redraw

  // Reset door/vent animations and button colors
  doorAnim.left.open=1;  doorAnim.left.target=1;
  doorAnim.right.open=1; doorAnim.right.target=1;
  ventAnim.open=1; ventAnim.target=1;
  if(doorMeshes.left)  doorMeshes.left.position.y  = -0.5;
  if(doorMeshes.right) doorMeshes.right.position.y = -0.5;
  if(ventPanelMesh){ ventPanelMesh.visible=false; ventPanelMesh.rotation.x=0; }
  // Reset all button colors to default open state
  for(const obj of interactables){
    if(obj.userData.action==='leftDoor'||obj.userData.action==='rightDoor'){
      obj.material.color.setHex(0x1a1a44);
      obj.userData._origColor=0x1a1a44;
    }
    if(obj.userData.action==='vent'){
      obj.material.color.setHex(0x442200);
      obj.userData._origColor=0x442200;
    }
  }

  initAudio();
  // Ensure AudioContext is resumed in VR
  const ac=getAudioCtx();
  if(ac&&ac.state==='suspended') ac.resume().then(()=>{ play('ambience'); }).catch(()=>{play('ambience');});
  else play('ambience');

  if(G.cfg.tomActive&&SFX.muziek){SFX.muziek.volume=0.15;SFX.muziek.play().catch(()=>{});}

  // VR HUD visible
  if(vrHudMesh) vrHudMesh.visible=true;
  highlightCamBtn(0);

  G.lureCD=LURE_CD_S; G.lureReady=false;
  G.lureCDTimer=setInterval(()=>{G.lureCD--;if(G.lureCD<=0){G.lureReady=true;G.lureCD=0;clearInterval(G.lureCDTimer);}},1000);
  G.alarmReady=true; G.alarmCD=0;

  G.tickTimer=setInterval(gameTick,TICK_MS);
  G.timeTimer=setInterval(tickTime,250);

  if(G.cfg.gijsActive)  setTimeout(scheduleGijsMove,5000);
  if(G.cfg.hoboActive)  scheduleHoboMove();
  if(G.cfg.markRutteActive) scheduleMarkCheck();
  scheduleMaduro();
  if(G.jeffreyActive){G.jeffreyStep=0;G.jeffreyPos=JEFFREY_PATH[0];G.jeffreyTimer=JEFFREY_SWITCH_S;}
  if(G.diddyActive)   setTimeout(scheduleDiddyMove,8000);

  drawBigScreen();
  markHudDirty();

  // Preload all animatronic overlay images now
  loadCamOverlayImg('gijs',    FILES.gijsCam);
  loadCamOverlayImg('hobo',    FILES.hoboGijsCam);
  loadCamOverlayImg('jeffrey', FILES.jeffreyCam);
  loadCamOverlayImg('chapo',   FILES.chapoCam);
  loadCamOverlayImg('diddy',   FILES.diddyCam);
  loadCamOverlayImg('tom',     FILES.tomCam);
  loadCamOverlayImg('maduro',  FILES.maduroCam);
}
window.startGame=startGame;

function restartGame(){
  killTimers(); stopAll();
  if(G){G.running=false;G.dead=false;G.won=false;} G=null;
  gameTimeStr='12:00 AM';
  alarmSphereMat.opacity=0;
  doorAnim.left.open=1;  doorAnim.left.target=1;
  doorAnim.right.open=1; doorAnim.right.target=1;
  ventAnim.open=1; ventAnim.target=1;
  if(doorMeshes.left)  doorMeshes.left.position.y  = -0.5;
  if(doorMeshes.right) doorMeshes.right.position.y = -0.5;
  if(ventPanelMesh){ ventPanelMesh.visible=false; ventPanelMesh.rotation.x=0; }
  if(vrHudMesh)  vrHudMesh.visible=false;
  if(vrDeathMesh)vrDeathMesh.visible=false;
  if(markBehindMesh) markBehindMesh.visible=false;
  const wl=scene.userData.markWarnLight; if(wl)wl.material.color.setHex(0x111111);
  // Reset button colors to default
  for(const obj of interactables){
    if(obj.userData.action==='leftDoor'||obj.userData.action==='rightDoor'){
      obj.material.color.setHex(0x1a1a44); obj.userData._origColor=0x1a1a44;
    }
    if(obj.userData.action==='vent'){
      obj.material.color.setHex(0x442200); obj.userData._origColor=0x442200;
    }
  }
  lastHighlighted = null;
  if(vrRestartBtn){
    vrRestartBtn.visible=false;
    const idx=interactables.indexOf(vrRestartBtn);
    if(idx>-1)interactables.splice(idx,1);
    if(vrRestartBtn.userData._label)vrRestartBtn.userData._label.visible=false;
  }
  selectedNight=0;
  showVRMenu(); // XR session is still active when restarting in-game
}
window.restartGame=restartGame;

// ══════════════════════════════════════════════════════
//  SECTION 30 — INIT
// ══════════════════════════════════════════════════════
buildRoom();
buildMarkVentOpening();
buildMarkBehindSprite();
initCtrlDots();

Object.values(FILES).forEach(src => {
  if (src.endsWith('.png') || src.endsWith('.jpg')) {
    const i = new Image(); i.src = src;
  }
});
CAMS.forEach(c => loadCamBg(c.id, () => {}));

</script>
